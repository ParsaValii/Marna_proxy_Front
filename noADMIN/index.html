<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>خطا در پیکربندی</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css"/>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Vazirmatn',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; overflow:hidden; background:#f8fafc; color:#1e293b; }
        @keyframes containerAppear { 0%{opacity:0;transform:translateY(24px) scale(.95)} 100%{opacity:1;transform:translateY(0) scale(1)} }
        @keyframes fadeIn { 0%{opacity:0} 100%{opacity:1} }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

        body::before { content:''; position:fixed; inset:0; background:linear-gradient(135deg,rgba(6,182,212,.03) 0,rgba(8,145,178,.06) 100%); z-index:-2; }
        body::after { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(6,182,212,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(6,182,212,.04) 1px,transparent 1px); background-size:60px 60px; z-index:-1; }

        .page-wrapper { position:fixed; inset:0; display:flex; justify-content:center; align-items:center; z-index:1; padding:20px; overflow-y:auto; }

        .card { background:#fff; padding:36px 36px 32px; border-radius:24px; width:100%; max-width:400px; text-align:center; box-shadow:0 4px 24px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04); animation:containerAppear .7s ease-out .1s backwards; position:relative; }

        .logo { display:flex; justify-content:center; margin-bottom:8px; }
        .logo img { width:72px; height:72px; display:block; }

        .page-icon { width:56px; height:56px; margin:0 auto 16px; background:linear-gradient(135deg,#06b6d4,#0891b2); border-radius:16px; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 20px rgba(6,182,212,.25); animation:containerAppear .7s ease-out .2s backwards, float 4s ease-in-out infinite; }
        .page-icon i { font-size:28px; color:#fff; }

        .page-title { font-size:22px; font-weight:700; color:#1e293b; margin:0 0 8px; letter-spacing:-.3px; animation:containerAppear .7s ease-out .25s backwards; }
        .page-sub { font-size:13px; color:#94a3b8; margin-bottom:20px; animation:containerAppear .7s ease-out .35s backwards; }

        .error-box { margin-top:4px; padding:16px 20px; border-radius:12px; background:#f0fdfa; border:1px solid #ccfbf1; color:#1e293b; font-size:14px; font-weight:500; line-height:1.7; animation:fadeIn .5s ease-out .5s backwards; text-align:center; }
        .error-box strong { color:#0891b2; font-weight:700; }

        .footer-hint { margin-top:24px; font-size:12px; color:#94a3b8; animation:fadeIn .5s ease-out .7s backwards; text-align:center; }
        .footer-hint a { color:#06b6d4; text-decoration:none; font-weight:600; transition:color .2s ease; }

        @media(max-width:768px) {
            .page-wrapper { padding:16px; }
            .card { padding:28px 24px 28px; border-radius:20px; }
            .logo img { width:64px; height:64px; }
            .page-title { font-size:19px; }
        }
        @media(max-width:480px) {
            .card { padding:24px 20px 24px; }
            .logo img { width:56px; height:56px; }
            .page-title { font-size:17px; }
            .page-sub { font-size:12px; }
        }
        @media(max-height:600px) and (orientation:landscape) {
            .page-wrapper { align-items:flex-start; padding-top:16px; }
            .card { padding:20px 28px; }
            .logo img { width:48px; height:48px; }
            .page-icon { width:40px; height:40px; margin-bottom:10px; }
            .page-icon i { font-size:20px; }
            .page-title { font-size:16px; }
            .footer-hint { margin-top:14px; }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="card">
            <div class="logo">
                <img src="../logo.png" alt="Nova Proxy">
            </div>
            <h1 class="page-title">رمز عبور تنظیم نشده است</h1>
            <p class="page-sub">لطفاً برای دسترسی به پنل، رمز عبور مدیر را تنظیم کنید</p>
            <div class="error-box">
                برای دسترسی به پنل مدیریت، باید یک متغیر محیطی با نام <strong>ADMIN</strong> تنظیم کنید
            </div>
            <div class="footer-hint">
                ساخته شده توسط <a href="https://github.com/IRNova/" target="_blank" rel="noopener">گروه نوا پروکسی</a>
            </div>
        </div>
    </div>
</body>
</html>
