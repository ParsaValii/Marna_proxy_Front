<!doctype html>
<html lang="fa" dir="rtl" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Marna Proxy — استقرار</title>
<link rel="icon" type="image/svg+xml" href="../logo-mark.svg" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root { --bg: #070809; --card: #101319; --c2: #0b0d11; --bd: #1c2027; --bd2: #262b34; --tx: #e9edf4; --tx2: #aeb6c4; --mu: #6f7888; --ac: #22d3ee; --ok: #34d399; --dg: #f87171; --wn: #f59e0b; --grad: linear-gradient(120deg, #22d3ee, #7c5cff); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Vazirmatn','Inter',system-ui,sans-serif; background: radial-gradient(800px 420px at 50% -6%, color-mix(in srgb, var(--ac) 14%, transparent), transparent 60%), var(--bg); color: var(--tx); min-height: 100vh; padding: 40px 16px; font-size: 14px; }
.wrap { max-width: 640px; margin: 0 auto; }
.brand { text-align: center; margin-bottom: 28px; }
.brand h1 { font-size: 24px; font-weight: 800; }
.brand h1 span { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.card { background: var(--card); border: 1px solid var(--bd); border-radius: 16px; padding: 24px; margin-bottom: 16px; box-shadow: 0 1px 0 rgba(255,255,255,.02), 0 14px 38px rgba(0,0,0,.5); }
.card h3 { font-size: 16px; margin-bottom: 16px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--tx2); margin-bottom: 5px; }
.field input { width: 100%; background: var(--c2); border: 1px solid var(--bd2); border-radius: 10px; color: var(--tx); font: inherit; font-size: 14px; padding: 11px 13px; outline: none; direction: ltr; text-align: left; }
.field input:focus { border-color: var(--ac); box-shadow: 0 0 0 3px rgba(34,211,238,.25); }
.hint { font-size: 11.5px; color: var(--mu); margin-top: 5px; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; border: 1px solid var(--bd2); background: var(--c2); color: var(--tx); font: inherit; font-weight: 600; font-size: 13px; padding: 11px 22px; border-radius: 10px; cursor: pointer; }
.btn:hover { border-color: var(--ac); color: var(--ac); }
.btn.p { background: var(--ac); color: #000; border: none; font-size: 15px; padding: 13px 30px; }
.btn.p:hover { filter: brightness(1.1); }
.btn:disabled { opacity: .45; cursor: not-allowed; }
.hidden { display: none; }
.token-banner { background: var(--grad); border-radius: 16px; padding: 20px 24px; text-align: center; margin-bottom: 20px; }
.token-banner a { display: inline-flex; align-items: center; gap: 8px; background: #fff; color: #000; font-weight: 700; font-size: 14px; padding: 12px 24px; border-radius: 10px; text-decoration: none; }
.token-banner p { color: rgba(255,255,255,.85); font-size: 12px; margin-top: 10px; }
.log { background: #000; border: 1px solid var(--bd); border-radius: 12px; padding: 16px; font-family: ui-monospace,monospace; font-size: 12px; line-height: 1.7; max-height: 300px; overflow-y: auto; color: var(--tx2); margin-top: 14px; white-space: pre-wrap; word-break: break-all; direction: ltr; text-align: left; }
.log .ok { color: var(--ok); } .log .err { color: var(--dg); } .log .wn { color: var(--wn); } .log .h { color: var(--ac); }
</style>
</head>
<body>
<div class="wrap">
<div class="brand"><h1>Marna <span>Proxy</span></h1></div>

<div class="token-banner">
  <a href="https://dash.cloudflare.com/profile/api-tokens?permissionGroupKeys=%5B%7B%22key%22%3A%22workers_scripts%22%2C%22type%22%3A%22edit%22%7D%2C%7B%22key%22%3A%22workers_kv_storage%22%2C%22type%22%3A%22edit%22%7D%2C%7B%22key%22%3A%22d1%22%2C%22type%22%3A%22edit%22%7D%2C%7B%22key%22%3A%22account_settings%22%2C%22type%22%3A%22read%22%7D%5D&accountId=*&zoneId=all&name=Marna%20Installer" target="_blank" rel="noopener">گام ۱: ساخت توکن API در کلادفلر</a>
  <p>دسترسی‌ها از قبل انتخاب شده — توکن را بسازید و کپی کنید</p>
</div>

<div class="card" id="step1">
  <h3>گام ۲: آپلود Worker</h3>
  <div class="field"><label>توکن API</label><input id="token" type="password" autocomplete="off" placeholder="توکن را اینجا بچسبانید..." /></div>
  <div class="field"><label>نام Worker</label><input id="name" placeholder="marna-proxy" /></div>
  <button class="btn p" id="btn" onclick="deploy()">استقرار روی کلادفلر</button>
  <p class="hint">فقط worker.js آپلود می‌شود. D1 و KV را باید دستی بسازید و Bind کنید.</p>
</div>

<div class="card hidden" id="step2">
  <h3>وضعیت</h3>
  <div class="log" id="log"></div>
</div>
</div>

<script>
var P = 'https://corsproxy.io/?';
var A = 'https://api.cloudflare.com/client/v4';

function $(id) { return document.getElementById(id); }
function log(m, c) { var l = $('log'); l.innerHTML += '<span class="' + (c || '') + '">' + m + '</span>\n'; l.scrollTop = l.scrollHeight; }

function buildMultipart(script, name) {
  var B = '----MarnaProxy' + Math.random().toString(36).substring(2, 10);
  var meta = JSON.stringify({ main_module: name, bindings: [], compatibility_date: '2024-01-01' });
  var parts = [];
  parts.push('--' + B);
  parts.push('Content-Disposition: form-data; name="script"; filename="worker.js"');
  parts.push('Content-Type: application/javascript+module');
  parts.push('');
  parts.push(script);
  parts.push('--' + B);
  parts.push('Content-Disposition: form-data; name="metadata"');
  parts.push('');
  parts.push(meta);
  parts.push('--' + B + '--');
  return { body: parts.join('\r\n'), boundary: B };
}

async function deploy() {
  var token = $('token').value.trim();
  var name = $('name').value.trim() || 'marna-proxy';
  if (!token) { alert('توکن API را وارد کنید'); return; }

  $('btn').disabled = true;
  $('step2').classList.remove('hidden');
  $('log').innerHTML = '';

  try {
    log('دریافت اطلاعات حساب...', 'h');
    var r1 = await fetch(P + encodeURIComponent(A + '/accounts?page=1&per_page=1'), { headers: { 'Authorization': 'Bearer ' + token } });
    var j1 = await r1.json();
    if (!j1.success) throw new Error(j1.errors.map(function(e) { return e.message; }).join(', '));
    var acc = j1.result[0];
    log('OK ' + acc.name, 'ok');

    log('\nبارگذاری worker.js...', 'h');
    var r2 = await fetch('../worker.js');
    if (!r2.ok) throw new Error('worker.js not found (HTTP ' + r2.status + ')');
    var script = await r2.text();
    log('OK ' + Math.round(script.length / 1024) + ' KB (v3.8.3)', 'ok');

    log('\nآپلود Worker (multipart)...', 'h');
    var mp = buildMultipart(script, name);
    var upUrl = A + '/accounts/' + acc.id + '/workers/scripts/' + name;
    var r3 = await fetch(P + encodeURIComponent(upUrl), {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'multipart/form-data; boundary=' + mp.boundary
      },
      body: mp.body
    });

    if (!r3.ok) {
      var t3 = ''; try { t3 = await r3.text(); } catch (e) { }
      throw new Error('Upload HTTP ' + r3.status + ': ' + t3.substring(0, 300));
    }
    var j3 = await r3.json();
    if (!j3.success) throw new Error(j3.errors.map(function(e) { return e.message; }).join(', '));
    log('OK Worker uploaded', 'ok');

    log('\nفعالسازی workers.dev...', 'h');
    var r4 = await fetch(P + encodeURIComponent(A + '/accounts/' + acc.id + '/workers/scripts/' + name + '/subdomain'), {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled: true })
    });
    var j4 = await r4.json();
    if (j4.success) { log('OK enabled', 'ok'); }
    else { log('WARN ' + JSON.stringify(j4.errors || []), 'wn'); }

    var devUrl = 'https://' + name + '.' + acc.name + '.workers.dev';
    log('\n=== DONE ===', 'ok');
    log(devUrl, 'ok');
    log('\nNext steps:', 'h');
    log('  1. Open ' + devUrl + '/login', 'wn');
    log('  2. Create D1 + KV in Cloudflare Dashboard and bind them', 'wn');
    log('  3. Set admin password', 'wn');

  } catch (e) {
    log('\n=== ERROR ===', 'err');
    log(e.message, 'err');
  }
  $('btn').disabled = false;
}
</script>
</body>
</html>
